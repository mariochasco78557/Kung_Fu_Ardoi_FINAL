backend:
  name: git-gateway
  branch: main

media_folder: "uploads"
public_folder: "/uploads"

locale: "es"

collections:

  # ── GALERÍA ────────────────────────────────────────────────────
  - name: "galeria"
    label: "Galería"
    description: "Añade, edita y organiza las fotos del club."
    files:
      - label: "Fotos de la Galería"
        name: "galeria"
        file: "content/galeria.json"
        fields:
          - label: "Fotos"
            name: "items"
            widget: "list"
            label_singular: "Foto"
            fields:
              - label: "Titulo"
                name: "titulo"
                widget: "string"
                hint: "Ej: VII Torneo Wushu Ardoi"
              - label: "Categoria"
                name: "categoria"
                widget: "select"
                options:
                  - label: "Competicion"
                    value: "competicion"
                  - label: "Entrenamiento"
                    value: "entrenamiento"
                  - label: "Eventos"
                    value: "eventos"
                default: "competicion"
              - label: "Imagen"
                name: "imagen"
                widget: "image"
                hint: "Sube la foto. Formatos: JPG, PNG, WebP."
              - label: "Descripcion"
                name: "descripcion"
                widget: "string"
                required: false
              - label: "Foto destacada (ocupa mas espacio)"
                name: "destacada"
                widget: "boolean"
                default: false

  # ── CAMPEONATOS ────────────────────────────────────────────────
  - name: "campeonatos"
    label: "Campeonatos"
    description: "Actualiza los resultados y medalleros de cada torneo."
    files:
      - label: "Medallero y Torneos"
        name: "campeonatos"
        file: "content/campeonatos.json"
        fields:
          - label: "Torneo principal destacado"
            name: "torneo_principal"
            widget: "object"
            fields:
              - label: "Nombre del torneo"
                name: "nombre"
                widget: "string"
              - label: "Año"
                name: "anio"
                widget: "number"
              - label: "Descripcion"
                name: "descripcion"
                widget: "text"
              - label: "Medallas de Oro"
                name: "oro"
                widget: "number"
              - label: "Medallas de Plata"
                name: "plata"
                widget: "number"
              - label: "Medallas de Bronce"
                name: "bronce"
                widget: "number"
              - label: "Logro especial"
                name: "logro_extra"
                widget: "string"
                required: false
                hint: "Ej: Clasificados para el Campeonato de Espana 2026"
          - label: "Historial de torneos"
            name: "historial"
            widget: "list"
            label_singular: "Torneo"
            fields:
              - label: "Nombre"
                name: "nombre"
                widget: "string"
              - label: "Año"
                name: "anio"
                widget: "number"
              - label: "Medallas"
                name: "resumen"
                widget: "string"
                hint: "Ej: 5 oro, 3 plata, 2 bronce"

  # ── EVENTOS ────────────────────────────────────────────────────
  - name: "eventos"
    label: "Eventos"
    description: "Proximos eventos, cursos y actividades del club."
    files:
      - label: "Agenda de eventos"
        name: "eventos"
        file: "content/eventos.json"
        fields:
          - label: "Eventos"
            name: "items"
            widget: "list"
            label_singular: "Evento"
            fields:
              - label: "Titulo"
                name: "titulo"
                widget: "string"
              - label: "Fecha"
                name: "fecha"
                widget: "string"
                hint: "Ej: 15/06/2025"
              - label: "Tipo"
                name: "tipo"
                widget: "select"
                options:
                  - label: "Torneo"
                    value: "torneo"
                  - label: "Curso tecnico"
                    value: "curso"
                  - label: "Exhibicion"
                    value: "exhibicion"
                  - label: "Puertas abiertas"
                    value: "puertas-abiertas"
                  - label: "Otro"
                    value: "otro"
                default: "otro"
              - label: "Descripcion"
                name: "descripcion"
                widget: "text"
                required: false
              - label: "Activo (mostrar en la web)"
                name: "activo"
                widget: "boolean"
                default: true

  # ── NOTICIAS ───────────────────────────────────────────────────
  - name: "noticias"
    label: "Noticias"
    description: "Articulos y noticias del club."
    folder: "content/noticias"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    label_singular: "Noticia"
    fields:
      - label: "Titulo"
        name: "title"
        widget: "string"
      - label: "Fecha"
        name: "date"
        widget: "datetime"
      - label: "Resumen"
        name: "resumen"
        widget: "text"
        hint: "Texto corto que aparece en la lista de noticias"
      - label: "Imagen destacada"
        name: "imagen"
        widget: "image"
        required: false
      - label: "Contenido"
        name: "body"
        widget: "markdown"
      - label: "Publicada"
        name: "publicada"
        widget: "boolean"
        default: true

  # ── CONFIGURACION ──────────────────────────────────────────────
  - name: "configuracion"
    label: "Configuracion"
    description: "Textos principales, contacto y redes sociales."
    files:
      - label: "Ajustes generales"
        name: "config"
        file: "content/config.json"
        fields:
          - label: "Hero - Textos"
            name: "hero"
            widget: "object"
            fields:
              - label: "Lema principal"
                name: "lema1"
                widget: "string"
              - label: "Subtitulo hero"
                name: "subtitulo"
                widget: "string"
          - label: "Contacto"
            name: "contacto"
            widget: "object"
            fields:
              - label: "Email"
                name: "email"
                widget: "string"
              - label: "Telefono"
                name: "telefono"
                widget: "string"
              - label: "Direccion"
                name: "direccion"
                widget: "string"
              - label: "Instagram"
                name: "instagram"
                widget: "string"
          - label: "SEO"
            name: "seo"
            widget: "object"
            fields:
              - label: "Titulo de la pagina"
                name: "title"
                widget: "string"
              - label: "Descripcion meta"
                name: "description"
                widget: "text"
